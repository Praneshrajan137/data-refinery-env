name: Deploy Hugging Face Space

on:
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HF_SPACE_ID: Praneshrajan15/data-quality-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stage Hugging Face Space contents
        run: python scripts/playground/stage_space.py --output-dir .hf-space-stage

      - name: Clone target Space repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://Praneshrajan15:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID} .hf-space-repo

      - name: Mirror staged tree into Space repo
        run: rsync -a --delete --exclude '.git/' .hf-space-stage/ .hf-space-repo/

      - name: Commit and push if changed
        working-directory: .hf-space-repo
        run: |
          if [[ -z "$(git status --short)" ]]; then
            echo "No Space changes to deploy."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: sync staged DataForge Space"
          git push origin HEAD:main
