name: Sync to HuggingFace Space
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Praneshrajan15:$HF_TOKEN@huggingface.co/spaces/Praneshrajan15/data-quality-env main --force
