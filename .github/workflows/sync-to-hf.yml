name: Validate and Sync to HuggingFace Space

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pydantic>=2.0

      - name: Run test suite
        run: python test_env.py

      - name: Run dataset verification
        run: python generate_datasets.py

      - name: Run validation checks
        run: python validate.py --skip-docker

      - name: Run benchmark (smoke test)
        run: python benchmark.py --seeds 2

  sync:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Praneshrajan15:$HF_TOKEN@huggingface.co/spaces/Praneshrajan15/data-quality-env main --force
