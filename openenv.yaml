spec_version: 1
name: data_quality_env
type: environment
app: server.app:app
port: 7860
description: >
  Data Quality Validation & Cleaning Pipeline — agents learn to detect
  and fix real-world data quality issues in tabular datasets under partial
  observability. Covers format errors, duplicates, missing values,
  referential integrity, cascading errors, floating-point precision traps,
  and business rule violations across three progressively challenging tasks
  (50–250 rows) with dense reward signals and information-theoretic
  exploration bonuses.
tags:
  - openenv
  - data-quality
  - rl-environment
  - tabular-data
tasks:
  - task_1_format_fixer
  - task_2_duplicate_detective
  - task_3_integrity_auditor
